services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: choreostudio
      POSTGRES_PASSWORD: choreostudio_dev
      POSTGRES_DB: choreostudio
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U choreostudio"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile.dev
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgres://choreostudio:choreostudio_dev@postgres:5432/choreostudio
      PORT: "4000"
      CORS_ORIGIN: http://localhost:3000
      NODE_ENV: development
    volumes:
      - .:/app
      - backend_nm:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: packages/frontend/Dockerfile.dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:4000
      VITE_WS_URL: ws://localhost:4000/ws
    volumes:
      - .:/app
      - frontend_nm:/app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_nm:
  frontend_nm:
