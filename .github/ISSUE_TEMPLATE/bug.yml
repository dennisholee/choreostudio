name: Bug Report
description: Report a defect in ChoreoStudio
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill in as much detail as possible.
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open canvas
        2. Place a Command element
        3. ...
    validations:
      required: true
  - type: dropdown
    id: milestone
    attributes:
      label: Milestone
      options:
        - M1 - Canvas Foundation
        - M2 - Collaboration & Persistence
        - M3 - Contract Generation
        - M4 - Governance & Launch
        - Unknown
  - type: textarea
    id: context
    attributes:
      label: Additional context (browser, OS, canvas size)
